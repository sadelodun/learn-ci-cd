name: Soundbox Notification Engine CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Build the components
  build-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile Application and Test Suite
        run: |
          make

      - name: Upload Test Runner Binary
        uses: actions/upload-artifact@v4
        with:
          name: test-runner-executable
          path: build/test_runner
          if-no-files-found: error

  # Job 2: Run Tests using the compiled binary
  run-tests:
    runs-on: ubuntu-latest
    needs: build-project
    steps:
      - name: Download Test Runner Binary
        uses: actions/download-artifact@v4
        with:
          name: test-runner-executable
          path: build/

      - name: Ensure Execution Permissions
        run: chmod +x build/test_runner

      - name: Run Test Suite and Generate Report
        run: |
          ./build/test_runner

      - name: Upload Raw Report File
        uses: actions/upload-artifact@v4
        with:
          name: test-report-txt
          path: build/test-report.txt
          if-no-files-found: error

  # Job 3: Process and Archive Test Report
  upload-report:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Download Test Report
        uses: actions/download-artifact@v4
        with:
          name: test-report-txt
          path: build/

      - name: Display Report Summary in CI Output Logs
        run: |
          cat build/test-report.txt

      - name: Archive Final Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Notification-Engine-Test-Report
          path: build/test-report.txt
