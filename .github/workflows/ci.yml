name: Payment Session Manager CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Build Phase across multi-toolchain matrix
  build:
    strategy:
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Native Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Compile Code (Enforces -Werror)
        run: |
          make CC=${{ matrix.compiler }} CXX=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}

      - name: Archive Test Binary
        uses: actions/upload-artifact@v4
        with:
          name: test-runner-${{ matrix.compiler }}
          path: build/test_runner
          if-no-files-found: error

  # Job 2: Unit Testing Phase
  unit-test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Download Compiled Binary
        uses: actions/download-artifact@v4
        with:
          name: test-runner-${{ matrix.compiler }}
          path: build/

      - name: Grant Binary Permissions
        run: chmod +x build/test_runner

      - name: Execute Boundary Assertions
        run: ./build/test_runner

  # Job 3: Dedicated Static Analysis Gate
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Toolchain Analyzers
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tools

      - name: Create Reports Workspace Folder
        run: mkdir -p reports

      - name: Execute Cppcheck Gate
        # --error-exitcode=1 forces a runner failure if any warning triggers
        run: |
          cppcheck --enable=all --inconclusive --error-exitcode=1 -I include/ src/ 2> reports/cppcheck-report.txt

      - name: Execute Clang Static Analyzer Gate
        run: |
          scan-build --status-bugs make clean all

      - name: Upload Static Analysis Artifact Reports
        if: always() # Ensures reports upload even if the analysis tool step failed
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: reports/cppcheck-report.txt
