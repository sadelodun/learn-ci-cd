name: CI/CD Pipeline
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-slim]
        compiler: [gcc, clang]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Build Tools (Ubuntu)
        if: matrix.os == 'ubuntu-slim'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Install Build Tools (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install make llvm mingw -y
        shell: bash

      - name: Run Build System
        run: |
          echo "Building the project..."
          make CC=${{ matrix.compiler }}

      - name: Make Binary Executable
        run: chmod +x build/test-${{ matrix.compiler }}

      - name: Run Embedded Test Binary
        run: |
          echo "Running tests..."
          ./build/test-${{ matrix.compiler }}

      - name: Upload Test Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-binary-${{ matrix.os }}-${{ matrix.compiler }}
          path: build/test-${{ matrix.compiler }}
          if-no-files-found: error
  
