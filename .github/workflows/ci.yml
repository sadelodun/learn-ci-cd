name: OTA Update Validator CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Toolchain Cross-Compilation
  build:
    strategy:
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. OPTIMISATION: Cache downloaded compiler packages
      - name: Cache Build Tool Packages
        id: cache-build-tools
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-build-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-apt-build-

      # Only run apt-get update if we missed the cache completely
      - name: Update Package Lists
        if: steps.cache-build-tools.outputs.cache-hit != 'true'
        run: sudo apt-get update

      - name: Install Compilers Safely
        run: |
          sudo apt-get install -y --no-install-recommends build-essential clang

      # Clean up unneeded archives to save cache quota storage space
      - name: Clean APT Cache
        run: sudo apt-get autoclean

      - name: Compile Targets with Coverage Instrumentation
        run: |
          make CC=${{ matrix.compiler }} CXX=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}

      - name: Archive Test Executable and Data Structures
        uses: actions/upload-artifact@v4
        with:
          name: test-bundle-${{ matrix.compiler }}
          path: build/
          if-no-files-found: error

  # Job 2: Execute Test Matrix Verification (Zero package installation needed here!)
  unit-test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Download Compiled Application Tree
        uses: actions/download-artifact@v4
        with:
          name: test-bundle-${{ matrix.compiler }}
          path: build/

      - name: Grant Runtime Execution Permissions
        run: chmod +x build/test_runner

      - name: Run Validations and Generate Profile Hits
        run: ./build/test_runner

      - name: Re-Archive Generated Coverage Data Maps
        uses: actions/upload-artifact@v4
        with:
          name: runtime-coverage-data-${{ matrix.compiler }}
          path: build/
          if-no-files-found: error

  # Job 3: Coverage Parsing and Quality Gate Enforcement
  coverage-gate:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout source code to match references
        uses: actions/checkout@v4

      # 2. OPTIMISATION: Cache gcovr parser tool separately
      - name: Cache Coverage Report Tools
        id: cache-coverage-tools
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-coverage-v1
          restore-keys: |
            ${{ runner.os }}-apt-coverage-

      - name: Update Package Lists (Coverage)
        if: steps.cache-coverage-tools.outputs.cache-hit != 'true'
        run: sudo apt-get update

      - name: Install Report Extraction Utilities
        run: |
          sudo apt-get install -y --no-install-recommends gcovr

      - name: Clean APT Cache (Coverage)
        run: sudo apt-get autoclean

      - name: Download Runtime Coverage Performance Profiles
        uses: actions/download-artifact@v4
        with:
          name: runtime-coverage-data-gcc
          path: build/

      - name: Generate Coverage Report
        run: |
          mkdir -p reports
          gcovr --root . --txt reports/coverage-summary.txt

      - name: Print Coverage Metrics to Console
        run: cat reports/coverage-summary.txt

      - name: Validate Numerical Quality Gate Threshold (Minimum 80%)
        run: |
          COVERAGE=$(grep -i "TOTAL" reports/coverage-summary.txt | awk '{print $4}' | sed 's/%//' | head -n 1)
          echo "Current parsed line coverage is calculated at: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
             echo "ERROR: Code coverage metrics have dropped below acceptable 80% boundary!"
             exit 1
          fi
          echo "Quality metrics approved. Proceeding down pipeline."

      - name: Publish Verified Metric Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Final-OTA-Coverage-Analysis
          path: reports/coverage-summary.txt
